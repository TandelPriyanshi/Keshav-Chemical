  </head>
  <body class="dark:bg-title">
    <div id="root"></div>
    <!-- SEO: Canonical URL uses actual site domain (important for correct indexing) -->
    <script>
      (function() {
        var link = document.getElementById('canonical-url');
        if (link) link.href = window.location.origin + (window.location.pathname || '/');
      })();
    </script>
    <!-- Remove HubSpot virality container (runs globally, before React) -->
    <script>
      (function() {
        function removeVirality() {
          var c = document.getElementById('hs-form-virality-container');
          var i = document.getElementById('hs-form-virality-iframe') || document.querySelector('iframe[src*="embedded-viral"], iframe[title="HubSpot Virality"]');
          if (c) c.remove();
          if (i) { var p = i.parentElement; i.remove(); if (p && p.childElementCount === 0) p.remove(); }
        }
        removeVirality();
        setTimeout(removeVirality, 1000);
        setTimeout(removeVirality, 2000);
        setTimeout(removeVirality, 4000);
        var obs = new MutationObserver(removeVirality);
        if (document.body) obs.observe(document.body, { childList: true, subtree: true });
        else document.addEventListener('DOMContentLoaded', function() { obs.observe(document.body, { childList: true, subtree: true }); });
        var iv = setInterval(removeVirality, 500);
        setTimeout(function() { clearInterval(iv); }, 15000);
      })();
    </script>
